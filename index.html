<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/cellar_54/cellar54-mark.webp" />
    <script>
      // Restore path redirected via 404.html for GitHub Pages SPA routing
      (function(l) {
        if (l.search[1] === 'p') {
          var params = {};
          l.search.slice(1).split('&').forEach(function(part) {
            var eq = part.indexOf('=');
            params[part.slice(0, eq)] = part.slice(eq + 1).replace(/~and~/g, '&');
          });
          var path = params.p ? '/' + params.p : '/';
          var query = params.q ? '?' + params.q : '';
          var base = l.pathname.replace(/\/$/, '');
          window.history.replaceState(null, null, base + path + query + l.hash);
        }
      }(window.location));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cellar 54 — Entertainment & Event Venue · Downtown Salem, OR</title>
    <meta name="description" content="Cellar 54 is downtown Salem's newest event venue — 4,000 sq ft of moody, modern space beneath The Forge. Open vendor policy. Full-service bar. Your event, your way." />
