<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/cellar_54/cellar54-mark.webp" />
    <script>
      // Restore path redirected via 404.html for GitHub Pages SPA routing
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          var path = decoded[0].slice(2);
          var query = decoded[1] ? '?' + decoded[1].slice(2) : '';
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + (path ? '/' + path : '/') + query + l.hash
          );
        }
      }(window.location));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
