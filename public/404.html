<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cellar 54</title>
    <script>
      var segmentCount = 1;
      var l = window.location;
      var pathParts = l.pathname.split('/').filter(Boolean);
      var basePath = '/' + pathParts.slice(0, segmentCount).join('/');
      var restPath = pathParts.slice(segmentCount).join('/');
      l.replace(
        l.protocol + '//' + l.host + basePath +
        '/?p=' + restPath.replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
