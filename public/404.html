<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cellar 54</title>
    <script>
      // SPA redirect for GitHub Pages — preserves the path across a 404
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/' +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
